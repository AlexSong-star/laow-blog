name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://aiedge-steel.vercel.app

      - run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "aiedge",
              "project": "aiedge",
              "gitSource": {"type": "github", "repoId": "1184058054", "ref": "main", "sha": "${{ github.sha }}"},
              "target": "production",
              "buildCommand": "npm run build",
              "outputDirectory": ".next"
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print('URL:', d.get('url', d.get('error',{}).get('message','')))"
